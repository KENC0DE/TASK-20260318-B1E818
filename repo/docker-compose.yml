services:
  db:
    image: postgres:16-alpine
    container_name: offline_retail_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-offline_retail}
      POSTGRES_USER: ${POSTGRES_USER:-offline_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-offline_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-offline_user} -d ${POSTGRES_DB:-offline_retail}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: offline_retail_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-offline_retail}
      DATABASE_USER: ${POSTGRES_USER:-offline_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-offline_password}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-offline_user}:${POSTGRES_PASSWORD:-offline_password}@db:5432/${POSTGRES_DB:-offline_retail}
      SECRET_KEY: ${SECRET_KEY:-change_me_in_env}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONPATH: /app
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
    driver: local
